# SCLAB Vision stand-alone GPU 오버레이.
# .env에 COMPOSE_FILE=docker-compose.yml:docker-compose.gpu.yml을 설정할 수 있다.
# nvidia-container-toolkit이 설치된 Linux GPU 호스트가 필요하다.
services:
  vision-aio:
    image: "${VISION_REGISTRY:-873379329511.dkr.ecr.ap-northeast-2.amazonaws.com/sclabio}/vision-aio-gpu:${VISION_TAG:-latest}"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: ["gpu"]
