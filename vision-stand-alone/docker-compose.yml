# SCLAB Vision stand-alone 배포 스택.
#
#   설치: ./install.sh
#   시작: ./up.sh   또는   docker compose up -d
#   중지: ./down.sh
#
# 이 스택은 SCLAB Vision과 필요한 데이터 서비스만 실행한다:
#   mongo + redis + qdrant + vision-aio + vision-console
#
# Compose 프로파일은 .env의 COMPOSE_PROFILES로 선택한다:
#   기본        vision-aio + vision-console + HTTPS 프록시 + mongo + redis + qdrant
#   profile s3  DVR cold-tier S3 호환 스토리지용 rustfs
#   GPU         docker-compose.gpu.yml 오버레이가 aio를 aio-gpu로 바꾼다
#
# 네트워크: 내부 compose 네트워크로, 루트 SCLAB 스택과 분리된다.
# 볼륨: stand-alone 데이터는 모두 ./data/* 아래에 bind mount된다.
name: sclab-vision-stand-alone

services:
  mongo:
    container_name: vision-stand-alone-mongo
    hostname: mongo
    image: "mongo:8.2.7"
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: "${MONGO_ROOT_USERNAME:-root}"
      MONGO_INITDB_ROOT_PASSWORD: "${MONGO_ROOT_PASSWORD:-changeThisMongoPassword}"
    volumes:
      - ./data/mongo/db:/data/db
      - ./data/mongo/configdb:/data/configdb
    logging:
      driver: "json-file"
      options: { max-size: "20m", max-file: "10" }
    networks:
      - vision-stand-alone-network

  redis:
    container_name: vision-stand-alone-redis
    hostname: redis
    image: "redis:8.2.1"
    restart: always
    command:
      - redis-server
      - --requirepass
      - "${REDIS_PASSWORD:-changeThisRedisPassword}"
      - --appendonly
      - "yes"
    volumes:
      - ./data/redis:/data
    logging:
      driver: "json-file"
      options: { max-size: "20m", max-file: "10" }
    networks:
      - vision-stand-alone-network

  qdrant:
    container_name: vision-stand-alone-qdrant
    hostname: qdrant
    image: "qdrant/qdrant:v1.15"
    restart: always
    environment:
      QDRANT__SERVICE__HOST: "0.0.0.0"
      QDRANT__SERVICE__API_KEY: "${VISION_QDRANT_API_KEY:-changeThisQdrantApiKey}"
    volumes:
      - ./data/qdrant:/qdrant/storage
    logging:
      driver: "json-file"
      options: { max-size: "20m", max-file: "10" }
    networks:
      - vision-stand-alone-network

  vision-aio:
    container_name: vision-stand-alone-aio
    hostname: vision-aio
    image: "${VISION_REGISTRY:-873379329511.dkr.ecr.ap-northeast-2.amazonaws.com/sclabio}/vision-aio:${VISION_TAG:-latest}"
    restart: always
    depends_on:
      - mongo
      - redis
      - qdrant
    environment:
      VISION_MONGO_URL: "${VISION_MONGO_URL:-mongodb://root:changeThisMongoPassword@mongo:27017/?authSource=admin}"
      VISION_MONGO_DB: "${VISION_MONGO_DB:-sclab_vision}"
      VISION_REDIS_URL: "${VISION_REDIS_URL:-redis://:changeThisRedisPassword@redis:6379}"
      VISION_STUDIO_SHARED: "${VISION_STUDIO_SHARED:-false}"
      VISION_QDRANT_URL: "${VISION_QDRANT_URL:-http://qdrant:6333}"
      VISION_QDRANT_API_KEY: "${VISION_QDRANT_API_KEY:-changeThisQdrantApiKey}"
      VISION_QDRANT_COLLECTION: "${VISION_QDRANT_COLLECTION:-VisionAnalysisVector}"
      VISION_VERSION: "${VISION_VERSION:-latest}"
      VISION_INTERNAL_TOKEN: "${VISION_INTERNAL_TOKEN:-sv-dev-internal-token}"
      VISION_ADMIN_JWT_SECRET: "${VISION_ADMIN_JWT_SECRET:-sv-dev-admin-jwt-secret}"
      VISION_SIGNING_KEY: "${VISION_SIGNING_KEY:-dev-insecure-signing-key}"
      VISION_SECRET_KEY: "${VISION_SECRET_KEY:-dev-insecure-secret-key}"
      VISION_AIO_CONTROL_ADDR: "0.0.0.0:8090"
      VISION_AIO_GATEWAY_ADDR: "0.0.0.0:8080"
      VISION_AIO_EGRESS_ADDR: "127.0.0.1:8088"
      VISION_HLS_CORS_ORIGINS: "${VISION_HLS_CORS_ORIGINS:-*}"
      VISION_RECORD_DEFAULT: "${VISION_RECORD_DEFAULT:-off}"
      VISION_RECORD_DIR: "/var/lib/vision/recordings"
      VISION_RECORD_DELETE_AFTER: "${VISION_RECORD_DELETE_AFTER:-86400}"
      VISION_S3_BUCKET: "${VISION_S3_BUCKET:-}"
      VISION_S3_ENDPOINT: "${VISION_S3_ENDPOINT:-http://rustfs:9000}"
      VISION_S3_REGION: "${VISION_S3_REGION:-us-east-1}"
      VISION_S3_ACCESS_KEY_ID: "${VISION_S3_ACCESS_KEY_ID:-rustfsadmin}"
      VISION_S3_SECRET_ACCESS_KEY: "${VISION_S3_SECRET_ACCESS_KEY:-rustfsadmin}"
      VISION_S3_PREFIX: "${VISION_S3_PREFIX:-recordings}"
      VISION_S3_ALLOW_HTTP: "true"
      VISION_S3_FORCE_PATH_STYLE: "true"
      RUST_LOG: "${RUST_LOG:-info}"
    volumes:
      - ./data/vision/app:/data
      - ./data/vision/recordings:/var/lib/vision/recordings
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging:
      driver: "json-file"
      options: { max-size: "20m", max-file: "10" }
    networks:
      - vision-stand-alone-network

  vision-console:
    container_name: vision-stand-alone-console
    hostname: vision-console
    image: "${VISION_REGISTRY:-873379329511.dkr.ecr.ap-northeast-2.amazonaws.com/sclabio}/vision-console:${VISION_TAG:-latest}"
    restart: always
    depends_on:
      - vision-aio
    environment:
      VISION_API_BASE: "http://vision-aio:8090"
      VISION_GATEWAY_BASE: "http://vision-aio:8080"
      VISION_DISCOVERY_BASE: "http://vision-aio:8090"
      VISION_WIZARD_BASE: "http://vision-aio:8090"
      VISION_VERSION: "${VISION_VERSION:-latest}"
      VISION_INTERNAL_TOKEN: "${VISION_INTERNAL_TOKEN:-sv-dev-internal-token}"
      VISION_ADMIN_JWT_SECRET: "${VISION_ADMIN_JWT_SECRET:-sv-dev-admin-jwt-secret}"
      SESSION_SECRET: "${SESSION_SECRET:-sv-dev-admin-jwt-secret}"
      SESSION_MAX_AGE: "${SESSION_MAX_AGE:-2592000}"
      PORT: "3000"
    logging:
      driver: "json-file"
      options: { max-size: "20m", max-file: "10" }
    networks:
      - vision-stand-alone-network

  vision-tls:
    container_name: vision-stand-alone-tls
    hostname: vision-tls
    image: "nginx:alpine3.18"
    restart: always
    depends_on:
      - vision-aio
      - vision-console
    ports:
      - "${VISION_CONSOLE_PORT:-8890}:3000"
      - "${VISION_CONTROL_PORT:-8090}:8090"
      - "${VISION_GATEWAY_PORT:-8080}:8080"
    volumes:
      - ./nginx-tls.conf:/etc/nginx/nginx.conf:ro
      - ./data/vision/certs:/etc/vision-tls:ro
    logging:
      driver: "json-file"
      options: { max-size: "20m", max-file: "10" }
    networks:
      - vision-stand-alone-network

  rustfs:
    container_name: vision-stand-alone-rustfs
    hostname: rustfs
    image: "rustfs/rustfs:latest"
    restart: always
    user: "0:0"
    profiles: ["s3"]
    environment:
      RUSTFS_VOLUMES: /data
      RUSTFS_ADDRESS: 0.0.0.0:9000
      RUSTFS_CONSOLE_ADDRESS: 0.0.0.0:9001
      RUSTFS_CONSOLE_ENABLE: "true"
      RUSTFS_ACCESS_KEY: "${VISION_S3_ACCESS_KEY_ID:-rustfsadmin}"
      RUSTFS_SECRET_KEY: "${VISION_S3_SECRET_ACCESS_KEY:-rustfsadmin}"
      RUSTFS_CORS_ALLOWED_ORIGINS: "*"
    volumes:
      - ./data/vision/rustfs:/data
      - ./data/vision/rustfs-logs:/logs
    ports:
      - "${VISION_S3_API_PORT:-19000}:9000"
      - "${VISION_S3_CONSOLE_PORT:-19001}:9001"
    logging:
      driver: "json-file"
      options: { max-size: "20m", max-file: "10" }
    networks:
      - vision-stand-alone-network

networks:
  vision-stand-alone-network:
    name: vision-stand-alone-network
