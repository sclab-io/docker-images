# SCLAB Vision — GPU 오버레이. base(docker-compose.yml)와 함께 적용된다.
#   .env에  COMPOSE_FILE=docker-compose.yml:docker-compose.gpu.yml  이 설정되면 자동 적용
#   (install.sh가 GPU 선택 시 기록). 수동: docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d
#
# Requires a Linux GPU host with nvidia-container-toolkit. Swaps aio for aio-gpu and reserves a GPU.
services:
  vision-aio:
    image: "${VISION_REGISTRY:-873379329511.dkr.ecr.ap-northeast-2.amazonaws.com/sclabio}/vision-aio-gpu:${VISION_TAG:-0.1.1}"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: ["gpu"]
