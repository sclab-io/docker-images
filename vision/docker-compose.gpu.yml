# SCLAB Vision GPU 오버레이. 기본 docker-compose.yml과 함께 적용한다.
#   .env에 COMPOSE_FILE=docker-compose.yml:docker-compose.gpu.yml이 설정되면 docker compose가 자동으로 적용한다.
#   install.sh에서 GPU 모드를 선택하면 이 설정을 기록한다.
#   수동 사용: docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d
#
# nvidia-container-toolkit이 설치된 Linux GPU 호스트가 필요하다. aio를 aio-gpu로 바꾸고 GPU를 예약한다.
services:
  vision-aio:
    image: "${VISION_REGISTRY:-873379329511.dkr.ecr.ap-northeast-2.amazonaws.com/sclabio}/vision-aio-gpu:${VISION_TAG:-0.1.1}"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: ["gpu"]
