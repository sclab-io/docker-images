# SCLAB Vision deployment stack (aio + console by default).
#
#   Install: ./install.sh          (step-by-step; Enter accepts each default)
#   Start:   ./up.sh   or   docker compose up -d
#   Stop:    ./down.sh
#
# Compose profiles are selected by COMPOSE_PROFILES in .env:
#   default     vision-aio + vision-console
#               Mongo/Redis/Qdrant are shared from existing mongo/redis/qdrant on sclab-network
#   profile s3  rustfs + rustfs-init for DVR cold-tier S3-compatible storage
#   GPU         docker-compose.gpu.yml overlay swaps aio for aio-gpu
#
# Network: external sclab-network, shared with the sibling stack.
# Volumes: all Vision-owned data is bind-mounted under ./data/vision/*.
name: sclab-vision

services:
  # Base services.
  vision-aio:
    container_name: vision-aio
    hostname: vision-aio
    image: "${VISION_REGISTRY:-873379329511.dkr.ecr.ap-northeast-2.amazonaws.com/sclabio}/vision-aio:${VISION_TAG:-0.1.1}"
    restart: always
    environment:
      # Shared state services on sclab-network.
      VISION_MONGO_URL: "${VISION_MONGO_URL:-mongodb://root:changeThisMongoPassword@mongo:27017/?authSource=admin}"
      VISION_MONGO_DB: "${VISION_MONGO_DB:-sclab}"
      VISION_REDIS_URL: "${VISION_REDIS_URL:-redis://:changeThisRedisPassword@redis:6379}"
      VISION_STUDIO_SHARED: "${VISION_STUDIO_SHARED:-true}"   # true adds sv- prefixes for shared Studio DB usage
      VISION_QDRANT_URL: "${VISION_QDRANT_URL:-http://qdrant:6333}"
      VISION_QDRANT_API_KEY: "${VISION_QDRANT_API_KEY:-changeThisQdrantApiKey}"
      VISION_QDRANT_COLLECTION: "${VISION_QDRANT_COLLECTION:-sv-VisionAnalysisVector}"
      # Shared secrets for aio and console. install.sh generates random production values.
      VISION_INTERNAL_TOKEN: "${VISION_INTERNAL_TOKEN:-sv-dev-internal-token}"
      VISION_ADMIN_JWT_SECRET: "${VISION_ADMIN_JWT_SECRET:-sv-dev-admin-jwt-secret}"
      VISION_SIGNING_KEY: "${VISION_SIGNING_KEY:-dev-insecure-signing-key}"
      # Bind addresses inside the container. External exposure is controlled by ports below.
      VISION_AIO_CONTROL_ADDR: "0.0.0.0:8090"
      VISION_AIO_GATEWAY_ADDR: "0.0.0.0:8080"
      VISION_AIO_EGRESS_ADDR: "127.0.0.1:8088"
      VISION_HLS_CORS_ORIGINS: "${VISION_HLS_CORS_ORIGINS:-*}"
      # Optional DVR recording. hot=disk volume below, cold=S3 profile.
      VISION_RECORD_DEFAULT: "${VISION_RECORD_DEFAULT:-off}"
      VISION_RECORD_DIR: "/var/lib/vision/recordings"
      VISION_RECORD_DELETE_AFTER: "${VISION_RECORD_DELETE_AFTER:-86400}"
      # Optional S3 cold tier. Empty VISION_S3_BUCKET means disk-only.
      VISION_S3_BUCKET: "${VISION_S3_BUCKET:-}"
      VISION_S3_ENDPOINT: "${VISION_S3_ENDPOINT:-http://rustfs:9000}"
      VISION_S3_REGION: "${VISION_S3_REGION:-us-east-1}"
      VISION_S3_ACCESS_KEY_ID: "${VISION_S3_ACCESS_KEY_ID:-rustfsadmin}"
      VISION_S3_SECRET_ACCESS_KEY: "${VISION_S3_SECRET_ACCESS_KEY:-rustfsadmin}"
      VISION_S3_PREFIX: "${VISION_S3_PREFIX:-recordings}"
      VISION_S3_ALLOW_HTTP: "true"
      VISION_S3_FORCE_PATH_STYLE: "true"
      RUST_LOG: "${RUST_LOG:-info}"
    ports:
      - "${VISION_CONTROL_PORT:-8090}:8090"   # control API
      - "${VISION_GATEWAY_PORT:-8080}:8080"   # HLS gateway
    volumes:
      - ./data/vision/recordings:/var/lib/vision/recordings   # DVR hot segments
      # Optional production TLS certificate mount:
      #   - ./data/vision/certs:/certs:ro   +  VISION_TLS_CERT=/certs/fullchain.pem VISION_TLS_KEY=/certs/privkey.pem
    extra_hosts:
      - "host.docker.internal:host-gateway"   # access RTSP sources on the host
    logging:
      driver: "json-file"
      options: { max-size: "20m", max-file: "10" }
    networks:
      - sclab-network

  vision-console:
    container_name: vision-console
    hostname: vision-console
    image: "${VISION_REGISTRY:-873379329511.dkr.ecr.ap-northeast-2.amazonaws.com/sclabio}/vision-console:${VISION_TAG:-0.1.1}"
    restart: always
    depends_on:
      - vision-aio
    environment:
      VISION_API_BASE: "http://vision-aio:8090"
      VISION_DISCOVERY_BASE: "http://vision-aio:8090"
      VISION_WIZARD_BASE: "http://vision-aio:8090"
      VISION_INTERNAL_TOKEN: "${VISION_INTERNAL_TOKEN:-sv-dev-internal-token}"
      VISION_ADMIN_JWT_SECRET: "${VISION_ADMIN_JWT_SECRET:-sv-dev-admin-jwt-secret}"
      PORT: "3000"
    ports:
      - "${VISION_CONSOLE_PORT:-8890}:3000"   # console web UI
    logging:
      driver: "json-file"
      options: { max-size: "20m", max-file: "10" }
    networks:
      - sclab-network

  # DVR cold-tier storage (profile: s3).
  # RustFS is an S3-compatible object store. aio connects to http://rustfs:9000.
  rustfs:
    container_name: vision-rustfs
    hostname: rustfs
    image: "rustfs/rustfs:latest"
    restart: always
    profiles: ["s3"]
    environment:
      RUSTFS_VOLUMES: /data
      RUSTFS_ADDRESS: 0.0.0.0:9000
      RUSTFS_CONSOLE_ADDRESS: 0.0.0.0:9001
      RUSTFS_CONSOLE_ENABLE: "true"
      RUSTFS_ACCESS_KEY: "${VISION_S3_ACCESS_KEY_ID:-rustfsadmin}"
      RUSTFS_SECRET_KEY: "${VISION_S3_SECRET_ACCESS_KEY:-rustfsadmin}"
      RUSTFS_CORS_ALLOWED_ORIGINS: "*"
    volumes:
      - ./data/vision/rustfs:/data
    ports:
      - "${VISION_S3_API_PORT:-9000}:9000"     # S3 API for external tools/debugging
      - "${VISION_S3_CONSOLE_PORT:-9001}:9001"  # RustFS web console
    logging:
      driver: "json-file"
      options: { max-size: "20m", max-file: "10" }
    networks:
      - sclab-network

  # One-shot bucket bootstrap. S3 buckets must exist before use.
  rustfs-init:
    container_name: vision-rustfs-init
    image: "minio/mc:latest"
    profiles: ["s3"]
    depends_on: [rustfs]
    restart: "no"
    entrypoint: >
      /bin/sh -c "
      until mc alias set rustfs http://rustfs:9000 ${VISION_S3_ACCESS_KEY_ID:-rustfsadmin} ${VISION_S3_SECRET_ACCESS_KEY:-rustfsadmin} >/dev/null 2>&1; do
        echo 'waiting for rustfs...'; sleep 2;
      done;
      mc mb --ignore-existing rustfs/${VISION_S3_BUCKET:-sv-recordings};
      echo 'rustfs bucket ready: ${VISION_S3_BUCKET:-sv-recordings}';
      "
    networks:
      - sclab-network

networks:
  sclab-network:
    external: true
