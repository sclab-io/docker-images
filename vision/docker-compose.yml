# SCLAB Vision 배포 스택(기본 aio + console).
#
#   설치: ./install.sh          (단계별 진행, Enter로 기본값 적용)
#   시작: ./up.sh   또는   docker compose up -d
#   중지: ./down.sh
#
# Compose 프로파일은 .env의 COMPOSE_PROFILES로 선택한다:
#   기본        vision-aio + vision-console
#               Mongo/Redis/Qdrant는 sclab-network의 기존 mongo/redis/qdrant를 공유한다
#   profile s3  DVR cold-tier S3 호환 스토리지용 rustfs
#   GPU         docker-compose.gpu.yml 오버레이가 aio를 aio-gpu로 바꾼다
#
# 네트워크: 외부 sclab-network, 같은 레벨의 메인 스택과 공유한다.
# 볼륨: Vision 소유 데이터는 모두 ./data/vision/* 아래에 bind mount된다.
name: sclab-vision

services:
  # 기본 서비스.
  vision-aio:
    container_name: vision-aio
    hostname: vision-aio
    image: "${VISION_REGISTRY:-873379329511.dkr.ecr.ap-northeast-2.amazonaws.com/sclabio}/vision-aio:${VISION_TAG:-latest}"
    restart: always
    environment:
      # sclab-network의 공유 상태 서비스.
      VISION_MONGO_URL: "${VISION_MONGO_URL:-mongodb://root:changeThisMongoPassword@mongo:27017/?authSource=admin}"
      VISION_MONGO_DB: "${VISION_MONGO_DB:-sclab}"
      VISION_REDIS_URL: "${VISION_REDIS_URL:-redis://:changeThisRedisPassword@redis:6379}"
      VISION_STUDIO_SHARED: "${VISION_STUDIO_SHARED:-true}"   # true이면 공유 Studio DB 사용을 위해 sv- 접두사를 추가한다
      VISION_QDRANT_URL: "${VISION_QDRANT_URL:-http://qdrant:6333}"
      VISION_QDRANT_API_KEY: "${VISION_QDRANT_API_KEY:-changeThisQdrantApiKey}"
      VISION_QDRANT_COLLECTION: "${VISION_QDRANT_COLLECTION:-sv-VisionAnalysisVector}"
      # aio와 console이 공유하는 secret. install.sh가 운영용 랜덤 값을 생성한다.
      VISION_INTERNAL_TOKEN: "${VISION_INTERNAL_TOKEN:-sv-dev-internal-token}"
      VISION_ADMIN_JWT_SECRET: "${VISION_ADMIN_JWT_SECRET:-sv-dev-admin-jwt-secret}"
      VISION_SIGNING_KEY: "${VISION_SIGNING_KEY:-dev-insecure-signing-key}"
      # 컨테이너 내부 bind 주소. 외부 노출은 메인 sclab-proxy가 제어한다.
      VISION_AIO_CONTROL_ADDR: "0.0.0.0:8090"
      VISION_AIO_GATEWAY_ADDR: "0.0.0.0:8080"
      VISION_AIO_EGRESS_ADDR: "127.0.0.1:8088"
      VISION_HLS_CORS_ORIGINS: "${VISION_HLS_CORS_ORIGINS:-*}"
      # 선택 DVR 녹화. hot은 아래 disk volume, cold는 S3 프로파일을 사용한다.
      VISION_RECORD_DEFAULT: "${VISION_RECORD_DEFAULT:-off}"
      VISION_RECORD_DIR: "/var/lib/vision/recordings"
      VISION_RECORD_DELETE_AFTER: "${VISION_RECORD_DELETE_AFTER:-86400}"
      # 선택 S3 cold tier. VISION_S3_BUCKET이 비어 있으면 disk-only로 동작한다.
      VISION_S3_BUCKET: "${VISION_S3_BUCKET:-}"
      VISION_S3_ENDPOINT: "${VISION_S3_ENDPOINT:-http://rustfs:9000}"
      VISION_S3_REGION: "${VISION_S3_REGION:-us-east-1}"
      VISION_S3_ACCESS_KEY_ID: "${VISION_S3_ACCESS_KEY_ID:-rustfsadmin}"
      VISION_S3_SECRET_ACCESS_KEY: "${VISION_S3_SECRET_ACCESS_KEY:-rustfsadmin}"
      VISION_S3_PREFIX: "${VISION_S3_PREFIX:-recordings}"
      VISION_S3_ALLOW_HTTP: "true"
      VISION_S3_FORCE_PATH_STYLE: "true"
      RUST_LOG: "${RUST_LOG:-info}"
    volumes:
      - ./data/vision/app:/data
      - ./data/vision/recordings:/var/lib/vision/recordings   # DVR hot segment 저장소
    extra_hosts:
      - "host.docker.internal:host-gateway"   # 호스트의 RTSP source에 접근한다
    logging:
      driver: "json-file"
      options: { max-size: "20m", max-file: "10" }
    networks:
      - sclab-network

  vision-console:
    container_name: vision-console
    hostname: vision-console
    image: "${VISION_REGISTRY:-873379329511.dkr.ecr.ap-northeast-2.amazonaws.com/sclabio}/vision-console:${VISION_TAG:-latest}"
    restart: always
    depends_on:
      - vision-aio
    environment:
      VISION_API_BASE: "http://vision-aio:8090"
      VISION_DISCOVERY_BASE: "http://vision-aio:8090"
      VISION_WIZARD_BASE: "http://vision-aio:8090"
      VISION_INTERNAL_TOKEN: "${VISION_INTERNAL_TOKEN:-sv-dev-internal-token}"
      VISION_ADMIN_JWT_SECRET: "${VISION_ADMIN_JWT_SECRET:-sv-dev-admin-jwt-secret}"
      PORT: "3000"
    logging:
      driver: "json-file"
      options: { max-size: "20m", max-file: "10" }
    networks:
      - sclab-network

  # DVR cold-tier 스토리지(profile: s3).
  # RustFS는 S3 호환 object store다. aio는 http://rustfs:9000에 연결한다.
  rustfs:
    container_name: vision-rustfs
    hostname: rustfs
    image: "rustfs/rustfs:latest"
    restart: always
    profiles: ["s3"]
    environment:
      RUSTFS_VOLUMES: /data
      RUSTFS_ADDRESS: 0.0.0.0:9000
      RUSTFS_CONSOLE_ADDRESS: 0.0.0.0:9001
      RUSTFS_CONSOLE_ENABLE: "true"
      RUSTFS_ACCESS_KEY: "${VISION_S3_ACCESS_KEY_ID:-rustfsadmin}"
      RUSTFS_SECRET_KEY: "${VISION_S3_SECRET_ACCESS_KEY:-rustfsadmin}"
      RUSTFS_CORS_ALLOWED_ORIGINS: "*"
    volumes:
      - ./data/vision/rustfs:/data
    ports:
      - "${VISION_S3_API_PORT:-19000}:9000"     # 외부 도구와 디버깅용 S3 API
      - "${VISION_S3_CONSOLE_PORT:-19001}:9001"  # RustFS 웹 console
    logging:
      driver: "json-file"
      options: { max-size: "20m", max-file: "10" }
    networks:
      - sclab-network

networks:
  sclab-network:
    external: true
