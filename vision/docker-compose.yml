# SCLAB Vision л°°нҸ¬ мҠӨнғқ(кё°ліё aio + console).
#
#   м„Өм№ҳ: ./install.sh          (лӢЁкі„лі„ м§„н–ү, EnterлЎң кё°ліёк°’ м Ғмҡ©)
#   мӢңмһ‘: ./up.sh   лҳҗлҠ”   docker compose up -d
#   мӨ‘м§Җ: ./down.sh
#
# Compose н”„лЎңнҢҢмқјмқҖ .envмқҳ COMPOSE_PROFILESлЎң м„ нғқн•ңлӢӨ:
#   кё°ліё        vision-aio + vision-console
#               Mongo/Redis/QdrantлҠ” sclab-networkмқҳ кё°мЎҙ mongo/redis/qdrantлҘј кіөмң н•ңлӢӨ
#   profile s3  DVR cold-tier S3 нҳёнҷҳ мҠӨнҶ лҰ¬м§Җмҡ© rustfs
#   GPU         docker-compose.gpu.yml мҳӨлІ„л Ҳмқҙк°Җ aioлҘј aio-gpuлЎң л°”кҫјлӢӨ
#
# л„ӨнҠёмӣҢнҒ¬: мҷёл¶Җ sclab-network, к°ҷмқҖ л ҲлІЁмқҳ л©”мқё мҠӨнғқкіј кіөмң н•ңлӢӨ.
# ліјлҘЁ: Vision мҶҢмң  лҚ°мқҙн„°лҠ” лӘЁл‘җ ./data/vision/* м•„лһҳм—җ bind mountлҗңлӢӨ.
name: sclab-vision

services:
  # кё°ліё м„ңл№„мҠӨ.
  vision-aio:
    container_name: vision-aio
    hostname: vision-aio
    image: "${VISION_REGISTRY:-873379329511.dkr.ecr.ap-northeast-2.amazonaws.com/sclabio}/vision-aio:${VISION_TAG:-0.1.1}"
    restart: always
    environment:
      # sclab-networkмқҳ кіөмң  мғҒнғң м„ңл№„мҠӨ.
      VISION_MONGO_URL: "${VISION_MONGO_URL:-mongodb://root:changeThisMongoPassword@mongo:27017/?authSource=admin}"
      VISION_MONGO_DB: "${VISION_MONGO_DB:-sclab}"
      VISION_REDIS_URL: "${VISION_REDIS_URL:-redis://:changeThisRedisPassword@redis:6379}"
      VISION_STUDIO_SHARED: "${VISION_STUDIO_SHARED:-true}"   # trueмқҙл©ҙ кіөмң  Studio DB мӮ¬мҡ©мқ„ мң„н•ҙ sv- м ‘л‘җмӮ¬лҘј м¶”к°Җн•ңлӢӨ
      VISION_QDRANT_URL: "${VISION_QDRANT_URL:-http://qdrant:6333}"
      VISION_QDRANT_API_KEY: "${VISION_QDRANT_API_KEY:-changeThisQdrantApiKey}"
      VISION_QDRANT_COLLECTION: "${VISION_QDRANT_COLLECTION:-sv-VisionAnalysisVector}"
      # aioмҷҖ consoleмқҙ кіөмң н•ҳлҠ” secret. install.shк°Җ мҡҙмҳҒмҡ© лһңлҚӨ к°’мқ„ мғқм„ұн•ңлӢӨ.
      VISION_INTERNAL_TOKEN: "${VISION_INTERNAL_TOKEN:-sv-dev-internal-token}"
      VISION_ADMIN_JWT_SECRET: "${VISION_ADMIN_JWT_SECRET:-sv-dev-admin-jwt-secret}"
      VISION_SIGNING_KEY: "${VISION_SIGNING_KEY:-dev-insecure-signing-key}"
      # м»Ён…Ңмқҙл„Ҳ лӮҙл¶Җ bind мЈјмҶҢ. мҷёл¶Җ л…ём¶ңмқҖ л©”мқё sclab-proxyк°Җ м ңм–ҙн•ңлӢӨ.
      VISION_AIO_CONTROL_ADDR: "0.0.0.0:8090"
      VISION_AIO_GATEWAY_ADDR: "0.0.0.0:8080"
      VISION_AIO_EGRESS_ADDR: "127.0.0.1:8088"
      VISION_HLS_CORS_ORIGINS: "${VISION_HLS_CORS_ORIGINS:-*}"
      # м„ нғқ DVR л…№нҷ”. hotмқҖ м•„лһҳ disk volume, coldлҠ” S3 н”„лЎңнҢҢмқјмқ„ мӮ¬мҡ©н•ңлӢӨ.
      VISION_RECORD_DEFAULT: "${VISION_RECORD_DEFAULT:-off}"
      VISION_RECORD_DIR: "/var/lib/vision/recordings"
      VISION_RECORD_DELETE_AFTER: "${VISION_RECORD_DELETE_AFTER:-86400}"
      # м„ нғқ S3 cold tier. VISION_S3_BUCKETмқҙ л№„м–ҙ мһҲмңјл©ҙ disk-onlyлЎң лҸҷмһ‘н•ңлӢӨ.
      VISION_S3_BUCKET: "${VISION_S3_BUCKET:-}"
      VISION_S3_ENDPOINT: "${VISION_S3_ENDPOINT:-http://rustfs:9000}"
      VISION_S3_REGION: "${VISION_S3_REGION:-us-east-1}"
      VISION_S3_ACCESS_KEY_ID: "${VISION_S3_ACCESS_KEY_ID:-rustfsadmin}"
      VISION_S3_SECRET_ACCESS_KEY: "${VISION_S3_SECRET_ACCESS_KEY:-rustfsadmin}"
      VISION_S3_PREFIX: "${VISION_S3_PREFIX:-recordings}"
      VISION_S3_ALLOW_HTTP: "true"
      VISION_S3_FORCE_PATH_STYLE: "true"
      RUST_LOG: "${RUST_LOG:-info}"
    volumes:
      - ./data/vision/recordings:/var/lib/vision/recordings   # DVR hot segment м ҖмһҘмҶҢ
    extra_hosts:
      - "host.docker.internal:host-gateway"   # нҳёмҠӨнҠёмқҳ RTSP sourceм—җ м ‘к·јн•ңлӢӨ
    logging:
      driver: "json-file"
      options: { max-size: "20m", max-file: "10" }
    networks:
      - sclab-network

  vision-console:
    container_name: vision-console
    hostname: vision-console
    image: "${VISION_REGISTRY:-873379329511.dkr.ecr.ap-northeast-2.amazonaws.com/sclabio}/vision-console:${VISION_TAG:-0.1.1}"
    restart: always
    depends_on:
      - vision-aio
    environment:
      VISION_API_BASE: "http://vision-aio:8090"
      VISION_DISCOVERY_BASE: "http://vision-aio:8090"
      VISION_WIZARD_BASE: "http://vision-aio:8090"
      VISION_INTERNAL_TOKEN: "${VISION_INTERNAL_TOKEN:-sv-dev-internal-token}"
      VISION_ADMIN_JWT_SECRET: "${VISION_ADMIN_JWT_SECRET:-sv-dev-admin-jwt-secret}"
      PORT: "3000"
    logging:
      driver: "json-file"
      options: { max-size: "20m", max-file: "10" }
    networks:
      - sclab-network

  # DVR cold-tier мҠӨнҶ лҰ¬м§Җ(profile: s3).
  # RustFSлҠ” S3 нҳёнҷҳ object storeлӢӨ. aioлҠ” http://rustfs:9000м—җ м—°кІ°н•ңлӢӨ.
  rustfs:
    container_name: vision-rustfs
    hostname: rustfs
    image: "rustfs/rustfs:latest"
    restart: always
    profiles: ["s3"]
    environment:
      RUSTFS_VOLUMES: /data
      RUSTFS_ADDRESS: 0.0.0.0:9000
      RUSTFS_CONSOLE_ADDRESS: 0.0.0.0:9001
      RUSTFS_CONSOLE_ENABLE: "true"
      RUSTFS_ACCESS_KEY: "${VISION_S3_ACCESS_KEY_ID:-rustfsadmin}"
      RUSTFS_SECRET_KEY: "${VISION_S3_SECRET_ACCESS_KEY:-rustfsadmin}"
      RUSTFS_CORS_ALLOWED_ORIGINS: "*"
    volumes:
      - ./data/vision/rustfs:/data
    ports:
      - "${VISION_S3_API_PORT:-9000}:9000"     # мҷёл¶Җ лҸ„кө¬мҷҖ л””лІ„к№…мҡ© S3 API
      - "${VISION_S3_CONSOLE_PORT:-9001}:9001"  # RustFS мӣ№ console
    logging:
      driver: "json-file"
      options: { max-size: "20m", max-file: "10" }
    networks:
      - sclab-network

networks:
  sclab-network:
    external: true
