events {
    worker_connections 1024;
}

http {
    upstream vllm_chat {
        server vllm:8000;
    }

    upstream vllm_embed {
        server vllm-embed:8000;
    }

    server {
        listen 80;

        # Common header settings (prevent errors and timeouts)
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;

        # 1. Route /v1/embeddings path to Embedding model
        location /v1/embeddings {
            proxy_pass http://vllm_embed;
        }

        # 2. Route all other paths (chat, completions, models, etc.) to Chat model
        location / {
            proxy_pass http://vllm_chat;
        }
    }
}
